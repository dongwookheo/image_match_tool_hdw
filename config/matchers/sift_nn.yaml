algorithm: sift_nn

feature:
  name: sift
  max_keypoints: 4096
  params:
    contrast_threshold: 0.0066667
    edge_threshold: 10
    n_octave_layers: 4
    sigma: 1.6

matcher:
  type: nearest_neighbor
  norm: l2
  ratio_threshold: 0.75
  mutual_check: false
  match_threshold: 0.0

geometry:
  type: homography
  ransac_method: usac_magsac
  reproj_threshold: 5.0
  confidence: 0.999
  max_iter: 10000

quality:
  min_matches: 20
  min_inliers: 10
  min_inlier_ratio: 0.2

runtime:
  device: auto
  dtype: float32
  cache_dir: .cache/models
  verbose: true
